<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MovieExplorer - Smart Movie Discovery</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Inter Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-mode">

    <!-- HEADER with Navigation -->
    <header class="navbar">
        <div class="logo">
            🎬 MovieExplorer
        </div>
        
        <!-- Navigation Links -->
        <div class="nav-links">
            <a href="#" id="home-link" class="nav-link active">
                <i class="fa-solid fa-home"></i>
                <span>Home</span>
            </a>
            <a href="#" id="watchlist-link" class="nav-link">
                <i class="fa-regular fa-bookmark"></i>
                <span>Watchlist</span>
                <span id="watchlist-count" class="badge">0</span>
            </a>
        </div>

        <button id="theme-toggle" class="theme-btn" aria-label="Toggle Theme">
            <i class="fa-solid fa-moon"></i>
        </button>
    </header>

    <!-- MAIN CONTAINER -->
    <main class="container">
        <!-- HERO SECTION with SEARCH -->
        <section class="hero">
            <h1>Discover Your Next Favorite Movie</h1>
            <p>Search. Explore. Get AI-powered recommendations.</p>

            <!-- FIXED: Added search-container div -->
            <div class="search-container">
                <div class="search-box">
                    <input 
                        type="text" 
                        id="search-input" 
                        placeholder="Search for a movie..."
                        autocomplete="off"
                    >
                    <button id="search-btn" class="btn-primary">
                        <i class="fa-solid fa-magnifying-glass"></i>
                    </button>
                </div>
                
                <!-- Search Suggestions Container - NOW OUTSIDE search-box but INSIDE container -->
                <div id="search-suggestions" class="search-suggestions"></div>
            </div>
        </section>

        <!-- HOME SECTIONS (Trending, Top Rated, etc) -->
        <div id="home-sections">
            <!-- Sections will be dynamically added here -->
        </div>

        <!-- MOVIE RESULT / DETAILS CONTAINER -->
        <section class="movie-section">
            <div id="movie-container" class="movie-container">
                <!-- Welcome message -->
                <div class="welcome-message">
                    <h2>✨ Welcome to MovieExplorer</h2>
                    <p>Search for a movie or browse our curated sections below</p>
                </div>
            </div>
        </section>

        <!-- SIMILAR MOVIES / RECOMMENDATIONS SECTION -->
        <div id="recommendations-section" style="display: none;">
            <!-- Will show DeepSeek recommendations -->
        </div>
    </main>

    <!-- MOVIE DETAILS MODAL -->
    <div id="movie-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <div id="modal-content"></div>
        </div>
    </div>

    <!-- TRAILER MODAL -->
    <div id="trailer-modal" class="modal">
        <div class="modal-content trailer-content">
            <span class="close-trailer">&times;</span>
            <iframe id="trailer-iframe" width="100%" height="500" frameborder="0" allowfullscreen></iframe>
        </div>
    </div>

    <!-- FOOTER -->
    <footer class="footer">
        <p>© 2026 MovieExplorer | Powered by DeepSeek AI</p>
    </footer>

    <!-- ES MODULES -->
    <script type="module" src="./js/main.js"></script>
</body>
</html>
